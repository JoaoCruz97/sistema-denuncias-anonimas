<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Denúncias</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="menu">

<div class="logo">
PORTAL DE DENÚNCIAS
</div>

<div class="links">
<a href="#">Registrar denúncia</a>
<a href="#">Consultar protocolo</a>
</div>

</nav>


<header>

<h1>Registro Anônimo de Ocorrências</h1>

<p>Utilize este portal para registrar denúncias de forma segura.</p>

</header>


<main>


<section class="categorias">

<h2>Selecione uma categoria</h2>

<div class="grid">

<button onclick="mostrarCrimes('seguranca')">
Segurança
</button>

<button onclick="mostrarCrimes('direitos')">
Direitos
</button>

<button onclick="mostrarCrimes('ambiente')">
Meio Ambiente
</button>

<button onclick="mostrarCrimes('cidade')">
Cidade
</button>

</div>

</section>


<section id="crimesArea" class="hidden">

<h2>Tipo de ocorrência</h2>

<div id="crimes"></div>

</section>


<section id="formArea" class="hidden">

<h2>Registrar denúncia</h2>

<p id="crimeSelecionado"></p>

<input type="text" id="bairro" placeholder="Bairro">

<input type="text" id="rua" placeholder="Rua ou local">

<input type="text" id="referencia" placeholder="Ponto de referência">

<textarea id="descricao" placeholder="Descreva a ocorrência"></textarea>

<div class="botoes">

<button class="cancelar" onclick="cancelar()">
Cancelar
</button>

<button class="finalizar" onclick="registrar()">
Finalizar registro
</button>

</div>

<p id="protocolo"></p>

</section>


<section class="consulta">

<h2>Consultar denúncia</h2>

<input type="text" id="consultaProtocolo" placeholder="Digite o número do protocolo">

<button onclick="consultar()">Consultar</button>

<p id="status"></p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
