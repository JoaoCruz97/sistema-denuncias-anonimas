<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Denúncias</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topo">

<h1>Portal de Denúncias</h1>
<p>Registro anônimo e seguro de ocorrências</p>

</header>


<div class="container">

<h2>Selecione uma categoria</h2>

<div class="categorias">

<div class="categoria" onclick="abrirCategoria('seguranca')">
<h3>Segurança</h3>
<p>Crimes e atividades suspeitas</p>
</div>

<div class="categoria" onclick="abrirCategoria('direitos')">
<h3>Direitos</h3>
<p>Assédio, discriminação e abusos</p>
</div>

<div class="categoria" onclick="abrirCategoria('ambiente')">
<h3>Meio Ambiente</h3>
<p>Crimes ambientais</p>
</div>

<div class="categoria" onclick="abrirCategoria('cidade')">
<h3>Cidade</h3>
<p>Problemas urbanos e serviços</p>
</div>

</div>


<div id="crimesContainer"></div>


<div id="formulario" class="formulario">

<h2>Registrar denúncia</h2>

<p id="tipoCrime"></p>

<input type="text" placeholder="Bairro" id="bairro">

<input type="text" placeholder="Rua ou local" id="rua">

<input type="text" placeholder="Ponto de referência" id="referencia">

<textarea placeholder="Descreva a denúncia" id="descricao"></textarea>

<div class="botoes">

<button class="cancelar" onclick="cancelar()">Cancelar</button>

<button class="enviar" onclick="registrar()">Finalizar registro</button>

</div>

<p id="protocolo"></p>

</div>


<div class="consulta">

<h2>Consultar denúncia</h2>

<input type="text" placeholder="Número do protocolo" id="consulta">

<button onclick="consultar()">Consultar</button>

<p id="status"></p>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
