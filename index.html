<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Sistema de Denúncias Anônimas</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<header>
<h1>Sistema de Denúncias Anônimas</h1>
<p>Registro seguro e confidencial</p>
</header>

<div class="container">

<div id="categorias" class="categorias">

<button onclick="abrirCategoria('seguranca')" class="categoria">
🚓 Segurança e Violência
</button>

<button onclick="abrirCategoria('direitos')" class="categoria">
⚖️ Direitos e Conduta
</button>

<button onclick="abrirCategoria('ambiente')" class="categoria">
🌱 Meio Ambiente e Bem-Estar
</button>

<button onclick="abrirCategoria('cidade')" class="categoria">
🏙 Cidade e Serviços
</button>

</div>

<div id="subcategorias"></div>

<div id="formulario" class="formulario hidden">

<h2>Registrar denúncia</h2>

<input id="bairro" placeholder="Bairro">

<input id="rua" placeholder="Rua ou local">

<input id="referencia" placeholder="Ponto de referência">

<textarea id="descricao" placeholder="Descreva a denúncia"></textarea>

<label>Anexar evidência</label>

<input type="file" id="arquivo">

<div class="botoes">

<button onclick="cancelar()">Cancelar</button>

<button onclick="registrar()">Finalizar registro</button>

</div>

</div>

<div class="consulta">

<h2>Consultar protocolo</h2>

<input id="numeroProtocolo" placeholder="Digite o número do protocolo">

<button onclick="consultar()">Consultar</button>

</div>

<div id="resultado"></div>

</div>

<script src="script.js"></script>

</body>

</html>
