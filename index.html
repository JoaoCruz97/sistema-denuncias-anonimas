<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Denúncias Anônimas</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Portal de Denúncias Anônimas</h1>
<p>Serviço seguro para registro de ocorrências</p>

</header>


<section class="categorias">

<h2>Selecione uma categoria</h2>

<div class="grid">

<button onclick="mostrarCrimes('seguranca')">Segurança e Violência</button>

<button onclick="mostrarCrimes('direitos')">Direitos e Conduta</button>

<button onclick="mostrarCrimes('meio')">Meio Ambiente</button>

<button onclick="mostrarCrimes('cidade')">Cidade e Serviços</button>

</div>

</section>


<section id="listaCrimes" class="hidden">

<h2>Tipos de ocorrência</h2>

<div id="crimes"></div>

</section>


<section id="formulario" class="hidden">

<h2>Registrar denúncia</h2>

<p id="crimeSelecionado"></p>

<input type="text" id="bairro" placeholder="Bairro">

<input type="text" id="rua" placeholder="Rua">

<input type="text" id="referencia" placeholder="Ponto de referência">

<textarea id="descricao" placeholder="Descreva a ocorrência"></textarea>

<input type="file">

<div class="botoes">

<button class="cancelar" onclick="cancelar()">Cancelar</button>

<button class="finalizar" onclick="registrar()">Finalizar registro</button>

</div>

<p id="protocolo"></p>

</section>


<section class="consulta">

<h2>Consultar denúncia</h2>

<input type="text" id="consultaProtocolo" placeholder="Digite o protocolo">

<button onclick="consultar()">Consultar</button>

<p id="status"></p>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>

</body>

</html>
