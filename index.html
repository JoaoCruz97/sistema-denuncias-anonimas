<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Denúncias</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<div class="logoContainer">

<div class="logo">🛡️</div>

<div>
<h1>Portal de Denúncias</h1>
<p>Registro seguro e anônimo</p>
</div>

</div>

</header>

<div class="container">

<h2>Selecione a categoria da denúncia</h2>

<div class="categorias">

<button onclick="abrirCategoria('seguranca')" class="categoria">
🚓 Segurança
</button>

<button onclick="abrirCategoria('direitos')" class="categoria">
⚖️ Direitos Humanos
</button>

<button onclick="abrirCategoria('ambiente')" class="categoria">
🌿 Meio Ambiente
</button>

<button onclick="abrirCategoria('cidade')" class="categoria">
🏙️ Problemas Urbanos
</button>

</div>

<div id="crimes"></div>

<div id="formulario" class="formulario">

<h3 id="tituloCrime"></h3>

<input type="text" id="bairro" placeholder="Bairro">

<input type="text" id="rua" placeholder="Rua ou local">

<input type="text" id="referencia" placeholder="Ponto de referência">

<textarea id="descricao" placeholder="Descreva a denúncia"></textarea>

<label>Anexar imagens da denúncia</label>

<input type="file" id="imagem" accept="image/*" multiple>

<div class="botoes">

<button class="cancelar" onclick="cancelar()">Cancelar</button>

<button class="finalizar" onclick="registrar()">Finalizar Registro</button>

</div>

<p id="protocolo"></p>

</div>

<div class="consulta">

<h3>Consultar denúncia</h3>

<input type="text" id="consultaProtocolo" placeholder="Digite o protocolo" maxlength="6">

<button onclick="consultar()">Consultar</button>

<p id="status"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
